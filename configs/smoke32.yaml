  ringup_enabled: true
  back_reaction_enabled: true
  stimulated_back_reaction: true
  back_reaction_requires_vector_map: true
  mode_volume_m3: null
  source_power_scale: 1.0
  back_reaction_scale: 1.0
  initial_stored_energy_J: 0.0
mode_map:
  type: auto
  vector_e_field_map: ../resources/TE011_onRes_Vector_E_FieldMap_radius327mm_length4000mm_f560p3MHz_Q500_coarse.fld
  vector_component_basis: cartesian
  vector_field_unit_scale: 1.0
  vector_energy_normalization_J: 1.0
  vector_gyro_quadrature_points: 16
  vector_normalize_to_peak: true
  vector_bounds_policy: error
  vector_cache_enabled: true
  vector_cache_path: null
  vector_cache_rebuild: false
  fallback_to_analytic: true
resonance:
  resonance_curve: null
  object_name: cavityHisto
  normalize_to_peak: true
dynamics:
  dt_max_s: 2e-9
  dt_min_s: 1e-12
  safety: 0.98
  v_turn_threshold_c: 1e-5
  axial_strategy: template_tiling
  template_build: mirror
  energy_loss_model: per_bounce
  energy_loss_scale: 1.0
  energy_floor_eV: 1000.0
  per_bounce_block_bounces: 32
  back_reaction_block_vectorized: true
  back_reaction_block_max_rel_state_change: 0.005
  compact_output_dt_s: null
  compact_output_include_turning_points: true
  energy_loss_fit_bounces: 6
  cyclotron_frequency_reference: instantaneous
  true_orbit_phase_iterations: 1
  time_step_strategy: phase_uniform
  samples_per_cyclotron_turn: 15
signal:
  lo_hz: null
  fs_if_hz: 22e6
  if_decim: 1
  fs_hz: null
  if_antialias_filter: true
  if_filter_order: 8
  if_filter_cutoff_ratio: 0.9
