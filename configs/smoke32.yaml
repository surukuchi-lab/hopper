    n_z: 801
cavity:
  radius_m: 0.327
  length_m: 4.0
  f0_hz: 560.3e6
  Q: 500
  response_model: time_evolution
  output_coupling_fraction: 1.0
  port_phase_rad: 0.0
  initial_cavity_phase_rad: 0.0
  extend_ringdown_s: null
