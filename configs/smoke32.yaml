physics:
  constants_preset: pdg_2022
simulation:
  starting_time_s: 0.0
  track_length_s: 1.0e-05
electron:
  position_reference: guiding_center
  position_coordinates: cylindrical
  energy_eV: 18563.251
  pitch_angle_deg: 89.0
  r0_m: 0.16
  phi0_rad: 0.0
  z0_m: 0.0
  vpar_sign: 1
  cyclotron_phase0_rad: 0.0
tracks: []
campaign:
  enabled: false
  parameter_ranges: {}
  slurm_partition: null
  slurm_time: 01:00:00
  slurm_cpus_per_task: 1
  slurm_mem_per_cpu: null
  max_jobs: null
features:
  include_true_orbit: true
  include_gradB: true
  include_curvature_drift: false
  include_resonance: false
  amplitude_mode: sqrtP
  normalize_amp_at_t0: false
trap:
  field_map_npz: ../resources/field_map_rz_components.npz
  coil_xml: null
  generate_if_missing: false
  placeholder_if_missing: false
  interpolation: bilinear
  clamp_to_grid: true
