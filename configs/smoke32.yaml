    bit_depth: 8
    data_type_size: 1
    signed: false
    v_range: 1.0
    v_offset: 0.0
    strict_range: true
output:
  out_dir: outputs_smoke32
  basename: smoke32
  write_npz: true
  write_root: false
  track_sampling: rf_sampled
  root_chunk_size: 200000
  write_log: true
  log_file: null
