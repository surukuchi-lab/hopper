simulation:
  starting_time_s: 0.0
  track_length_s: 0.001

electron:
  position_reference: guiding_center   # guiding_center OR instantaneous
  position_coordinates: cylindrical    # auto OR cylindrical OR cartesian
  energy_eV: 18563.251
  pitch_angle_deg: 89.0
  r0_m: 0.16
  phi0_rad: 0.0
  z0_m: 0.0
  vpar_sign: 1
  cyclotron_phase0_rad: 0.0         # initial gyrophase; for guiding_center starts this selects the initial orbit point around the configured guiding center

features:
  include_true_orbit: true
  include_gradB: true
  include_curvature_drift: true
  include_resonance: true
  amplitude_mode: sqrtP
  normalize_amp_at_t0: false

trap:
  field_map_npz: ../resources/field_map_rz_components.npz
  coil_xml: null                       # accepts absolute paths or paths relative to this config file
  generate_if_missing: false
  placeholder_if_missing: false
  interpolation: bilinear
  clamp_to_grid: true
  grid:
    r_max_m: 0.327
    z_min_m: -2.0
    z_max_m: 2.0
    n_r: 201
    n_z: 801

cavity:
  radius_m: 0.327
  length_m: 4.0
  f0_hz: 560.3e6
  Q: 500

mode_map:
  type: analytic_te011

resonance:
  resonance_curve: ../resources/UnitTestOutput.root                # accepts absolute paths or paths relative to this config file
  object_name: cavityHisto
  normalize_to_peak: true

dynamics:
  dt_max_s: 2e-9
  dt_min_s: 1e-12
  safety: 0.98
  v_turn_threshold_c: 1e-5

  axial_strategy: template_tiling      # direct OR template_tiling
  template_build: mirror               # auto OR integrate OR mirror

  # Production default: accurate bouncewise radiative correction with evolving γ and µ.
  # Use analytic for short validation windows only; it is intentionally more expensive.
  energy_loss_model: per_bounce        # none OR per_bounce OR linear_fit OR analytic
  energy_loss_scale: 1.0
  energy_floor_eV: 1000.0
  energy_loss_fit_bounces: 6

  # phase_uniform keeps exactly this many samples per cyclotron turn on the RF/root grid.
  time_step_strategy: phase_uniform    # axial_adaptive OR phase_bounded OR phase_uniform
  samples_per_cyclotron_turn: 15

signal:
  lo_hz: null
  fs_if_hz: 22e6
  if_decim: 1
  fs_hz: null
  if_antialias_filter: true
  if_filter_order: 8
  if_filter_cutoff_ratio: 0.9
  carrier_phase0_rad: 0.0
  normalize_power: false

output:
  out_dir: outputs                  # relative to the working directory
  basename: sim
  write_npz: true
  write_root: true
  track_sampling: rf_sampled           # rf_sampled OR if_sampled
  root_chunk_size: 200000
